<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Neo Social Autopilot TikTok Redirect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #f6f2ff;
      background: #05040b;
    }

    a {
      color: #00eaff;
      font-weight: bold;
    }

    .card {
      border: 1px solid rgba(0, 234, 255, 0.35);
      border-radius: 18px;
      padding: 24px;
      background: rgba(15, 13, 31, 0.92);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>TikTok Authorization Redirect</h1>
    <p>Redirecting back to Neo Social Autopilot...</p>
    <p id="fallback"></p>
  </div>

  <script>
    const localCallback = "http://localhost:8902/oauth/tiktok/callback";
    const query = window.location.search || "";
    const target = localCallback + query;

    document.getElementById("fallback").innerHTML =
      'If you are not redirected, <a href="' + target.replaceAll('"', "%22") + '">click here</a>.';

    window.location.replace(target);
  </script>
</body>
</html>
